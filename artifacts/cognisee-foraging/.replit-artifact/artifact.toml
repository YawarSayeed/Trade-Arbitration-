kind = "web"
previewPath = "/"
title = "Cognisee Epistemic Foraging"
version = "1.0.0"
id = "artifacts/cognisee-foraging"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24450

[services.development]
run = "pnpm --filter @workspace/cognisee-foraging run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/cognisee-foraging", "run", "build" ]
publicDir = "artifacts/cognisee-foraging/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24450"
BASE_PATH = "/"
